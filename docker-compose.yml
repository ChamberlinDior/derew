version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: oviro-postgres
    environment:
      POSTGRES_DB: oviro_db
      POSTGRES_USER: oviro
      POSTGRES_PASSWORD: oviro_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oviro -d oviro_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: oviro-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oviro-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: oviro_db
      DB_USER: oviro
      DB_PASSWORD: oviro_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: OVIROsecretKeyVeryLongAndSecure2024!@#PROD
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
