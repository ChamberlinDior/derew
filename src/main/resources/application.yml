server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: oviro-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:oviro}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@oviro.com
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

oviro:
  jwt:
    secret: ${JWT_SECRET:OVIROsecretKeyVeryLongAndSecure2024!@#$%^&*()ABCDEF}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

  qr-code:
    validity-seconds: 300
    size: 300

  commission:
    default-rate: 0.15

  sos:
    alert-radius-km: 5

  fcm:
    # Set to true and supply a Firebase service-account JSON to enable push notifications
    enabled: false
    # Path to the Firebase service-account JSON (classpath: or file: prefix)
    service-account-path: classpath:firebase/service-account.json

  wallet:
    fcfa-per-ut: 1000

app:
  storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.oviro: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
